openapi: 3.1.0
info:
  title: Ingredient Management API
  description: API for managing ingredients
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:
  /ingredients:
    get:
      summary: List all ingredients
      responses:
        '200':
          description: List of ingredients retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'

  /ingredients/{id}:
    get:
      summary: Get an ingredient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ingredient found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                type: string
                example: "Ingredient.id={id} is not found"

  /ingredients/{id}/stock:
    get:
      summary: Get ingredient stock value at a specific time
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: at
          in: query
          required: true
          description: Specific date and time (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: unit
          in: query
          required: true
          schema:
            type: string
            enum: [PCS, KG, L]
      responses:
        '200':
          description: Stock value calculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValue'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
                example: "Either mandatory query parameter `at` or `unit` is not provided."
        '404':
          description: Ingredient not found

  /dishes:
    get:
      summary: List all dishes with their ingredients
      responses:
        '200':
          description: List of dishes retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'

  /dishes/{id}/ingredients:
    put:
      summary: Update ingredients linked to a dish
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: List of ingredients to associate or dissociate
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Ingredient'
      responses:
        '200':
          description: Dish ingredients updated successfully
        '400':
          description: Missing or invalid request body
        '404':
          description: Dish.id={id} is not found

components:
  schemas:
    Ingredient:
      type: object
      required: [id, name, category, price]
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        price:
          type: number
          format: double

    StockValue:
      type: object
      properties:
        unit:
          type: string
          enum: [PCS, KG, L]
        value:
          type: number

    Dish:
      type: object
      required: [id, name, unitPrice]
      properties:
        id:
          type: string
        name:
          type: string
        unitPrice:
          type: number
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'